name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        # v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up Go
        # v5.5.0
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: go.mod

      - name: Configure private module access
        run: |
          # Configure git to use token for private repos
          git config --global url."https://${{ secrets.PLATFORM_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GOPRIVATE: github.com/delightfulhammers/*

      - name: Run GoReleaser
        # v6.2.1
        uses: goreleaser/goreleaser-action@90a3faa9d0182683851fbfa97ca1a2cb983bfca3
        with:
          distribution: goreleaser
          version: '~> v2'
          # Skip validate to allow dirty git state from go.mod modification
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_TOKEN: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}
          GOPRIVATE: github.com/delightfulhammers/*

  # Sync Linux and Windows binaries to the public homebrew-tap repo
  # This allows users to download binaries without access to the private bop repo
  sync-public-binaries:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Get release version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          cd assets
          # Download Linux and Windows archives (not macOS - Homebrew handles that)
          gh release download ${{ steps.version.outputs.tag }} \
            --repo delightfulhammers/bop \
            --pattern 'bop_*_linux_*.tar.gz' \
            --pattern 'bop_*_windows_*.zip' \
            --pattern 'checksums.txt'

          # Create version-agnostic copies for stable download URLs
          for f in bop_*_linux_amd64.tar.gz; do cp "$f" bop-linux-amd64.tar.gz; done
          for f in bop_*_linux_arm64.tar.gz; do cp "$f" bop-linux-arm64.tar.gz; done
          for f in bop_*_windows_amd64.zip; do cp "$f" bop-windows-amd64.zip; done
          for f in bop_*_windows_arm64.zip; do cp "$f" bop-windows-arm64.zip; done

      - name: Create or update homebrew-tap release
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Check if release exists
          if gh release view "$TAG" --repo delightfulhammers/homebrew-tap &>/dev/null; then
            echo "Release $TAG exists, uploading assets..."
            gh release upload "$TAG" assets/* \
              --repo delightfulhammers/homebrew-tap \
              --clobber
          else
            echo "Creating release $TAG..."
            # Build release notes using printf to avoid YAML heredoc issues
            {
              printf 'Linux and Windows binaries for bop %s\n\n' "$TAG"
              printf '## Installation\n\n'
              printf '**Linux (amd64):**\n'
              printf '```bash\n'
              printf 'curl -LO https://github.com/delightfulhammers/homebrew-tap/releases/download/%s/bop_%s_linux_amd64.tar.gz\n' "$TAG" "${TAG#v}"
              printf 'tar xzf bop_%s_linux_amd64.tar.gz\n' "${TAG#v}"
              printf 'sudo mv bop /usr/local/bin/\n'
              printf '```\n\n'
              printf '**Linux (arm64):**\n'
              printf '```bash\n'
              printf 'curl -LO https://github.com/delightfulhammers/homebrew-tap/releases/download/%s/bop_%s_linux_arm64.tar.gz\n' "$TAG" "${TAG#v}"
              printf 'tar xzf bop_%s_linux_arm64.tar.gz\n' "${TAG#v}"
              printf 'sudo mv bop /usr/local/bin/\n'
              printf '```\n\n'
              printf '**Windows:** Download the appropriate .zip file and extract to your PATH.\n\n'
              printf '**macOS:** Use Homebrew: `brew install delightfulhammers/tap/bop`\n'
            } > /tmp/release-notes.md
            gh release create "$TAG" assets/* \
              --repo delightfulhammers/homebrew-tap \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md
          fi

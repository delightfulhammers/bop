name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Skip fork PRs: they can't access secrets (PLATFORM_ACCESS_TOKEN) needed
    # to checkout the private platform repo dependency.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bop
        uses: actions/checkout@v4
        with:
          path: bop

      - name: Checkout platform
        uses: actions/checkout@v4
        with:
          repository: delightfulhammers/platform
          path: platform
          token: ${{ secrets.PLATFORM_ACCESS_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: bop/go.mod

      - name: Install dependencies
        working-directory: bop
        run: go mod download

      - name: Format
        working-directory: bop
        run: |
          fmt_output=$(gofmt -l .)
          if [ -n "$fmt_output" ]; then
            echo "Please run gofmt on the following files:"
            echo "$fmt_output"
            exit 1
          fi

      - name: Vet
        working-directory: bop
        run: go vet ./...

      - name: Test
        working-directory: bop
        run: go test ./...

name: AI Code Review

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip fork PRs: they don't have access to secrets (API keys, platform token)
    # and would fail. This also guards against future trigger changes (e.g.,
    # pull_request_target) that would expose secrets to fork PRs.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required for SARIF upload
      pull-requests: write    # Required to post PR comments
      id-token: write         # Required for OIDC authentication with platform

    steps:
      - name: Checkout bop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git diff
          path: bop

      - name: Checkout platform
        uses: actions/checkout@v4
        with:
          repository: delightfulhammers/platform
          path: platform
          token: ${{ secrets.PLATFORM_ACCESS_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: bop/go.mod

      - name: Prepare embed
        working-directory: bop
        run: |
          mkdir -p internal/config/embed
          cp bop.yaml internal/config/embed/bop.yaml

      - name: Build bop
        working-directory: bop
        run: go build -o bop ./cmd/bop

      - name: Get head commit message
        id: get-commit
        working-directory: bop
        run: |
          # Capture commit message safely using GITHUB_OUTPUT heredoc syntax
          echo "message<<EOF" >> $GITHUB_OUTPUT
          git log -1 --format=%B ${{ github.event.pull_request.head.sha }}
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check for skip trigger
        id: skip-check
        working-directory: bop
        env:
          # Use environment variables to safely pass potentially untrusted content
          COMMIT_MSG: ${{ steps.get-commit.outputs.message }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Check for skip trigger in commit message, PR title, or PR description
          # Exit codes: 0 = skip, 1 = review, other = error
          set +e
          ./bop check-skip \
            --commit-message "$COMMIT_MSG" \
            --pr-title "$PR_TITLE" \
            --pr-description "$PR_BODY"
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skip trigger detected, skipping code review"
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "No skip trigger found, proceeding with code review"
          else
            echo "Error: check-skip command failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Run AI code review
        if: steps.skip-check.outputs.skip != 'true'
        working-directory: bop
        env:
          # OIDC authentication with platform (keyless, uses id-token permission)
          BOP_TENANT_ID: ${{ vars.BOP_TENANT_ID }}
          # BYOK API keys (required for beta tier)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          # Observability settings from repository variables
          CR_OBSERVABILITY_LOGGING_LEVEL: ${{ vars.CR_OBSERVABILITY_LOGGING_LEVEL }}
          CR_OBSERVABILITY_LOGGING_FORMAT: ${{ vars.CR_OBSERVABILITY_LOGGING_FORMAT }}
        run: |
          # Compare PR branch against base branch
          # github.head_ref = source branch (e.g., feature/foo)
          # github.event.pull_request.base.ref = target branch (e.g., main)
          ./bop review branch ${{ github.head_ref }} \
            --base ${{ github.event.pull_request.base.ref }} \
            --output ./review-output \
            --post-github-review \
            --github-owner ${{ github.repository_owner }} \
            --github-repo ${{ github.event.repository.name }} \
            --pr-number ${{ github.event.pull_request.number }} \
            --commit-sha ${{ github.event.pull_request.head.sha }}

      - name: Find review files
        if: steps.skip-check.outputs.skip != 'true'
        id: find-files
        working-directory: bop
        run: |
          # Debug: show what files were created
          echo "Contents of review-output directory:"
          ls -la review-output/ || echo "review-output directory does not exist"

          echo ""
          echo "Contents of subdirectories:"
          find review-output -type f -name "*.md" -o -name "*.sarif"

          if [ ! -d "review-output" ]; then
            echo "Error: review-output directory was not created"
            exit 1
          fi

          # Find merged markdown file (pattern: {repo}_{branch}_merged_{timestamp}.md)
          MARKDOWN_FILE=$(find review-output -maxdepth 1 -name "*_merged_*.md" | head -1)

          # Find SARIF files (could be in subdirectory or at root)
          SARIF_FILE=$(find review-output -name "*.sarif" | head -1)

          if [ -z "$MARKDOWN_FILE" ]; then
            echo "Error: Could not find merged markdown file"
            echo "Expected pattern: review-output/*_merged_*.md"
            exit 1
          fi

          if [ -z "$SARIF_FILE" ]; then
            echo "Error: Could not find SARIF file"
            echo "Expected: *.sarif somewhere in review-output/"
            exit 1
          fi

          echo "markdown_file=$MARKDOWN_FILE" >> $GITHUB_OUTPUT
          echo "sarif_file=$SARIF_FILE" >> $GITHUB_OUTPUT

          echo "Found markdown: $MARKDOWN_FILE"
          echo "Found SARIF: $SARIF_FILE"

      # SARIF upload removed: PR comments from github-actions[bot] are the
      # single source of truth. Uploading SARIF caused duplicate findings
      # from github-advanced-security[bot]. SARIF files are still archived
      # in the review artifacts below for tooling/debugging purposes.

      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        if: steps.skip-check.outputs.skip != 'true'
        with:
          name: code-review-results
          path: bop/review-output/
          retention-days: 30

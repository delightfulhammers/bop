name: 'bop Code Review'
description: 'AI-powered code review for pull requests using GitHub Actions OIDC authentication'

inputs:
  platform-url:
    description: 'Platform auth service URL (e.g., https://api.delightfulhammers.com)'
    required: true
  tenant-id:
    description: 'Tenant ID for authentication'
    required: true
  oidc-audience:
    description: 'OIDC token audience (defaults to hostname from platform-url)'
    required: false
    default: ''
  base-ref:
    description: 'Base ref for diff comparison'
    required: false
    default: 'main'
  github-token:
    description: 'GitHub token for posting review comments'
    required: false
    default: ${{ github.token }}
  post-findings:
    description: 'Whether to post findings as PR comments (true/false)'
    required: false
    default: 'true'
  bop-version:
    description: 'bop version to install (e.g., v0.1.0, latest)'
    required: false
    default: 'latest'

outputs:
  findings-count:
    description: 'Number of findings from the review'
    value: ${{ steps.review.outputs.findings_count }}

runs:
  using: 'composite'
  steps:
    - name: Get OIDC Token
      id: get-oidc-token
      uses: actions/github-script@v7
      env:
        PLATFORM_URL: ${{ inputs.platform-url }}
        OIDC_AUDIENCE: ${{ inputs.oidc-audience }}
      with:
        script: |
          // Derive audience from platform-url if not explicitly set
          let audience = process.env.OIDC_AUDIENCE;
          if (!audience) {
            const url = new URL(process.env.PLATFORM_URL);
            audience = url.hostname;
          }
          core.info(`Requesting OIDC token with audience: ${audience}`);
          const token = await core.getIDToken(audience);
          core.setSecret(token);
          core.setOutput('token', token);

    - name: Exchange for Platform Token
      id: exchange-token
      shell: bash
      env:
        PLATFORM_URL: ${{ inputs.platform-url }}
        TENANT_ID: ${{ inputs.tenant-id }}
        OIDC_TOKEN: ${{ steps.get-oidc-token.outputs.token }}
      run: |
        # Prevent command echoing to avoid leaking secrets
        set +x

        # Build JSON payload safely using jq
        JSON_PAYLOAD=$(jq -n \
          --arg tenant_id "${TENANT_ID}" \
          --arg id_token "${OIDC_TOKEN}" \
          '{
            product_id: "bop",
            tenant_id: $tenant_id,
            provider_type: "github",
            id_token: $id_token
          }')

        # Exchange GitHub OIDC token for platform access token
        # Use -s (silent) to prevent request details in error output
        # Use --max-time to prevent hanging on unresponsive server
        HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" \
          --max-time 30 \
          -X POST "${PLATFORM_URL}/auth/actions-oidc" \
          -H "Content-Type: application/json" \
          -d "${JSON_PAYLOAD}")

        # Mask response immediately to prevent token leakage
        RESPONSE=$(cat response.json)
        echo "::add-mask::${RESPONSE}"
        rm -f response.json

        if [ "${HTTP_CODE}" != "200" ]; then
          echo "::error::Failed to exchange OIDC token (HTTP ${HTTP_CODE})"
          exit 1
        fi

        ACCESS_TOKEN=$(echo "${RESPONSE}" | jq -r '.access_token')
        if [ -z "${ACCESS_TOKEN}" ] || [ "${ACCESS_TOKEN}" = "null" ]; then
          echo "::error::Invalid response from platform - no access token"
          exit 1
        fi

        # Mask the token in logs
        echo "::add-mask::${ACCESS_TOKEN}"
        echo "access_token=${ACCESS_TOKEN}" >> "${GITHUB_OUTPUT}"

    - name: Install bop
      shell: bash
      env:
        BOP_VERSION: ${{ inputs.bop-version }}
      run: |
        # Install bop CLI
        if [ "${BOP_VERSION}" = "latest" ]; then
          echo "Installing latest bop..."
          curl -sSfL https://raw.githubusercontent.com/delightfulhammers/bop/main/install.sh | sh
        else
          echo "Installing bop ${BOP_VERSION}..."
          curl -sSfL https://raw.githubusercontent.com/delightfulhammers/bop/main/install.sh | sh -s -- -v "${BOP_VERSION}"
        fi

        # Add to PATH
        echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

    - name: Run bop Review
      id: review
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        BOP_ACCESS_TOKEN: ${{ steps.exchange-token.outputs.access_token }}
        BASE_REF: ${{ inputs.base-ref }}
        POST_FINDINGS: ${{ inputs.post-findings }}
      run: |
        # Determine review command flags
        FLAGS="--base ${BASE_REF}"
        if [ "${POST_FINDINGS}" = "true" ]; then
          FLAGS="${FLAGS} --post"
        fi

        echo "Running: bop review branch ${FLAGS}"

        # Run the review and capture output
        OUTPUT=$(bop review branch ${FLAGS} 2>&1) || {
          echo "::error::bop review failed"
          echo "${OUTPUT}"
          exit 1
        }

        echo "${OUTPUT}"

        # Extract findings count from output (if available)
        FINDINGS_COUNT=$(echo "${OUTPUT}" | grep -oP 'Found \K\d+(?= findings?)' || echo "0")
        echo "findings_count=${FINDINGS_COUNT}" >> "${GITHUB_OUTPUT}"

branding:
  icon: 'code'
  color: 'purple'

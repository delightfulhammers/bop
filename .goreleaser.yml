version: 2

project_name: bop

before:
  hooks:
    # Note: go mod tidy removed to avoid dirty git state during release
    - go test ./...

builds:
  - id: bop
    main: ./cmd/bop
    binary: bop
    env:
      # CGO disabled for static binaries. SQLite store (currently unused) will
      # show a warning at runtime but tool functions normally without it.
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/delightfulhammers/bop/internal/version.version={{.Version}}

  - id: bop-mcp
    main: ./cmd/bop-mcp
    binary: bop-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/delightfulhammers/bop/internal/version.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - docs/GITHUB_ACTION_SETUP.md
      - .claude/skills/triage-pr-review.md
      - bop.yaml

# Homebrew formula publishing
# Install with: brew install delightfulhammers/homebrew-tap/bop
brews:
  - name: bop
    ids:
      - default
    repository:
      owner: delightfulhammers
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/delightfulhammers/bop"
    description: "AI-powered code review tool with multi-provider LLM support"
    license: "MIT"
    install: |
      bin.install "bop"
      bin.install "bop-mcp"
    test: |
      system "#{bin}/bop", "version"
    caveats: |
      To use bop, set at least one LLM provider API key:
        export ANTHROPIC_API_KEY="your-key"    # Claude models
        export OPENAI_API_KEY="your-key"       # GPT models
        export GEMINI_API_KEY="your-key"       # Gemini models

      Quick start:
        bop review branch main

      For GitHub PR integration:
        export GITHUB_TOKEN="your-token"
        bop review branch main --github-post --pr 123

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: delightfulhammers
    name: bop
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"

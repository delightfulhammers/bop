version: 2

project_name: code-reviewer

before:
  hooks:
    # Note: go mod tidy removed to avoid dirty git state during release
    - go test ./...

builds:
  - id: cr
    main: ./cmd/cr
    binary: cr
    env:
      # CGO disabled for static binaries. SQLite store (currently unused) will
      # show a warning at runtime but tool functions normally without it.
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/bkyoung/code-reviewer/internal/version.version={{.Version}}

  - id: code-reviewer-mcp
    main: ./cmd/code-reviewer-mcp
    binary: code-reviewer-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/bkyoung/code-reviewer/internal/version.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - docs/GITHUB_ACTION_SETUP.md
      - .claude/skills/triage-pr-review.md
      - cr.yaml

# Homebrew formula publishing
# Install with: brew install bkyoung/code-reviewer/code-reviewer
brews:
  - name: code-reviewer
    ids:
      - default
    repository:
      owner: bkyoung
      name: homebrew-code-reviewer
      branch: main
      token: "{{ .Env.HOMEBREW_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/bkyoung/code-reviewer"
    description: "AI-powered code review tool with multi-provider LLM support"
    license: "MIT"
    install: |
      bin.install "cr"
      bin.install "code-reviewer-mcp"
    test: |
      system "#{bin}/cr", "version"
    caveats: |
      To use code-reviewer, set at least one LLM provider API key:
        export ANTHROPIC_API_KEY="your-key"    # Claude models
        export OPENAI_API_KEY="your-key"       # GPT models
        export GEMINI_API_KEY="your-key"       # Gemini models

      Quick start:
        cr review branch main

      For GitHub PR integration:
        export GITHUB_TOKEN="your-token"
        cr review branch main --github-post --pr 123

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: bkyoung
    name: code-reviewer
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"

# =============================================================================
# EXAMPLE WORKFLOW - Copy to your repository's .github/workflows/ directory
# =============================================================================
#
# This is a reference example showing how to integrate bop AI code review
# into your PR workflow.
#
# This file is located in docs/examples/ and will NOT run automatically.
# You must copy it to your repository to use it.
#
# To use this workflow:
# 1. Copy this file to .github/workflows/bop-review.yml in your repository
# 2. Commit and push - reviews will run on new PRs

name: bop Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read          # Required to checkout code
  pull-requests: write    # Required to post review comments

jobs:
  review:
    # Skip fork PRs: secrets (API keys) are not available to fork PRs
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    name: AI Code Review

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for diff comparison

      - name: Run bop Review
        uses: delightfulhammers/bop-github-action@main
        with:
          base-ref: ${{ github.base_ref }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Optional: configure reviewers and blocking behavior
          # reviewers: 'security,code-reviewer'
          # block-threshold: 'high'
          # fail-on-findings: 'true'

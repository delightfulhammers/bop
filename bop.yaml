# Code Reviewer Configuration File
# This file configures the bop application for CI/CD usage.
#
# NOTE: This file is embedded into the bop binary at build time to enable
# zero-config operation. Users can override any setting with their own
# bop.yaml file or environment variables.

# LLM Provider Configuration
# Providers define connection details (API keys, credentials, timeouts) for LLM services.
# The defaultModel is used when a reviewer doesn't specify its own model.
# Reviewers (defined below) reference these providers by name.
providers:
  # Static provider (for testing - returns canned responses)
  static:
    enabled: false
    defaultModel: "static-model"

  # OpenAI provider (GPT models)
  openai:
    enabled: true
    defaultModel: "gpt-5.2"
    apiKey: "${OPENAI_API_KEY}"

  # Anthropic provider (Claude models)
  anthropic:
    enabled: true
    defaultModel: "claude-sonnet-4-5"
    apiKey: "${ANTHROPIC_API_KEY}"

  # Google Gemini provider
  gemini:
    enabled: true
    defaultModel: "gemini-3-pro-preview"
    apiKey: "${GEMINI_API_KEY}"
    timeout: "180s"  # Gemini 3 Pro is a reasoning model that may need extra time

  # Ollama provider (local LLM)
  # ollama:
  #   enabled: false
  #   defaultModel: "qwen3:235b"

# Reviewer Configuration
# Each reviewer represents a code review perspective backed by an LLM provider.
# The default reviewer uses Anthropic with no persona — it relies on the
# review.instructions block below for guidance. This enables a zero-config
# experience: one API key (ANTHROPIC_API_KEY) is all you need.
#
# For specialized reviewers, configure additional personas below or upgrade
# to bop Pro for curated, provider-optimized reviewer panels.
reviewers:
  default:
    provider: "anthropic"
    weight: 1.0


# Default reviewers to use when no --reviewers flag is specified
defaultReviewers:
  - default

# Store Configuration
# Enables persistence of review history to SQLite database
store:
  enabled: true
  path: "~/.config/bop/reviews.db"

# Output Configuration
output:
  directory: "./review-output"

# Git Configuration (optional)
# git:
#   repositoryDir: "."

# Planning Configuration (disabled for CI/CD - not interactive)
planning:
  enabled: false
  provider: "openai"
  model: "gpt-5.2-mini"
  maxQuestions: 5
  timeout: "30s"

# Merge Configuration (for multi-provider consensus)
merge:
  enabled: true
  strategy: "consensus"
  # LLM provider for summary synthesis (defaults to anthropic/claude-haiku-4-5)
  provider: "anthropic"
  model: "claude-haiku-4-5"

# Verification Configuration (agent verification of findings)
# Disabled by default: verification uses a separate LLM call (Gemini by default),
# requiring a second API key. Enable and configure when you have multiple providers.
verification:
  enabled: false
  # LLM provider for verification (defaults to gemini/gemini-3-flash-preview)
  provider: "gemini"
  model: "gemini-3-flash-preview"
  maxTokens: 64000
  depth: "medium"
  costCeiling: 0.50
  confidence:
    default: 75
    critical: 60
    high: 70
    medium: 75
    low: 85

# Budget Configuration (cost control)
# budget:
#   hardCapUSD: 10.0
#   degradationPolicy:
#     - "reduce-providers"
#     - "reduce-context"

# Redaction Configuration (secret protection)
# IMPORTANT: Enable this for production use!
redaction:
  enabled: true
  denyGlobs:
    - "**/*.env"
    - "**/*.pem"
    - "**/*.key"
    - "**/credentials.json"
    - "**/secrets.*"

# Determinism Configuration (reproducible reviews)
determinism:
  enabled: false
  temperature: 0.0
  useSeed: true

# Observability Configuration
observability:
  logging:
    enabled: true
    level: "info"
    format: "human"
    redactAPIKeys: true
  metrics:
    enabled: true

# Theme Extraction Configuration (Issue #240)
# Extracts themes, conclusions, and disputed patterns from prior findings
# to prevent repeat findings across review rounds.
themeExtraction:
  enabled: true
  # Extraction strategy determines what context is extracted:
  # - "abstract": High-level themes only (e.g., "input validation", "error handling")
  # - "specific": Themes + specific conclusions and anti-patterns
  # - "comprehensive": Themes + conclusions + disputed patterns with rationales (default)
  #
  # "comprehensive" is most effective at preventing repeat findings because it:
  # 1. Includes abstract themes for conceptual coverage
  # 2. Adds specific conclusions (e.g., "truncation uses >= intentionally")
  # 3. Extracts disputed patterns with WHY they were disputed
  strategy: "comprehensive"
  # LLM provider for theme extraction - uses a small, fast model since the task
  # is simple (extracting 2-5 word phrases from finding descriptions)
  provider: "anthropic"
  model: "claude-haiku-4-5"
  # Maximum output tokens. The response is just a small JSON array like
  # {"themes": ["input validation", "error handling"]}, so this is generous.
  maxTokens: 4096
  # Cost guard: minimum prior findings required before theme extraction runs.
  # With only 1-2 findings, there's not enough data to form meaningful themes,
  # so we skip the LLM call entirely.
  minFindingsForTheme: 3
  # Limits themes injected into the review prompt to prevent context bloat.
  # More than 10 themes would waste tokens on the main reviewer prompt.
  maxThemes: 10

# Deduplication Configuration
# Controls finding deduplication across providers
deduplication:
  semantic:
    enabled: true
    # LLM provider for semantic comparison (uses a fast model)
    # NOTE: Change provider/model if you don't have ANTHROPIC_API_KEY configured
    provider: "anthropic"
    model: "claude-haiku-4-5"
    maxTokens: 64000
    # Only compare findings within this line distance
    lineThreshold: 50
    # Cost guard: max pairs to compare per review
    maxCandidates: 200

# Size Guards Configuration
# Prevents context overflow when reviewing large PRs
sizeGuards:
  enabled: true
  # Emit warning at this token count
  warnTokens: 150000
  # Truncate PR at this token count
  maxTokens: 200000
  # Per-provider overrides for different context limits
  providers:
    gemini:
      warnTokens: 750000
      maxTokens: 1000000

# Review Configuration
# Custom instructions to guide the code review process
# NOTE: Output format is handled by the system. These instructions focus on WHAT to review.
review:
  # GitHub bot username for auto-dismissing stale reviews
  # Set to "none" to disable auto-dismiss
  botUsername: "github-actions[bot]"

  # Block threshold: which severity levels trigger REQUEST_CHANGES
  # Valid: "critical", "high" (default), "medium", "low", "none"
  blockThreshold: "high"

  # Categories that always block regardless of severity
  alwaysBlockCategories:
    # - "security"

  # Post out-of-diff findings as individual issue comments (default: true)
  # Out-of-diff findings are on lines not included in the PR diff (deleted lines,
  # unchanged context) and cannot be posted as inline review comments.
  # When enabled (default), these findings are posted as issue comments with
  # fingerprint markers, making them visible to MCP tools for triage.
  # The summary comment still includes an "Findings Outside Diff" section for
  # human readability, but the individual comments enable machine interaction.
  # Set to false to only include out-of-diff findings in the summary comment.
  postOutOfDiffAsComments: true

  # Fine-grained action control (overrides blockThreshold for specific severities)
  # actions:
  #   onCritical: "request_changes"
  #   onHigh: "request_changes"
  #   onMedium: "comment"
  #   onLow: "comment"
  #   onClean: "approve"
  #   onNonBlocking: "approve"

  instructions: |
    Perform a thorough, systematic review focusing on these categories:

    **Security (use category: "security", severity: "high" for vulnerabilities):**
    - Injection vulnerabilities (SQL, command, XSS)
    - Authentication/authorization issues
    - Sensitive data exposure (secrets, PII, API keys)
    - Input validation and sanitization
    - OWASP Top 10 vulnerabilities

    **Bugs (use category: "bug"):**
    - Null dereferences, off-by-one errors, logic errors (severity: "high")
    - Race conditions, resource leaks, deadlocks (severity: "high")
    - Edge cases: empty inputs, boundary conditions (severity: "medium")
    - Concurrency issues, goroutine leaks (severity: "high")

    **Test Coverage (use category: "test_coverage", severity: "medium"):**
    - Missing unit tests for new functionality
    - Untested edge cases and error paths
    - Weak assertions that don't verify behavior

    **Code Quality (use category: "maintainability", severity: "low"):**
    - DRY violations and duplicated code
    - Complex functions needing decomposition
    - Poor naming or unclear code
    - Silent error swallowing (use category: "error_handling", severity: "medium")

    **Architecture (use category: "architecture", severity: "medium"):**
    - SOLID principle violations
    - Inappropriate abstraction levels
    - Missing dependency injection

    **Performance (use category: "performance"):**
    - N+1 queries, unnecessary allocations (severity: "medium")
    - Poor algorithmic complexity (severity: "high" if significant)

    Prioritize: security vulnerabilities > bugs > error handling > everything else.
    Only report actionable issues. Skip stylistic preferences unless they impact clarity.

# HTTP Configuration
http:
  timeout: "120s"
  maxRetries: 5
  initialBackoff: "2s"
  maxBackoff: "30s"
  backoffMultiplier: 2.0

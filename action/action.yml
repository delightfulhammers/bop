name: 'AI Code Reviewer'
description: 'AI-powered code review using multiple LLM providers (Anthropic, OpenAI, Gemini)'
author: 'bkyoung'
branding:
  icon: 'code'
  color: 'purple'

inputs:
  # Provider API Keys (at least one required)
  anthropic-api-key:
    description: 'Anthropic API key'
    required: false
  openai-api-key:
    description: 'OpenAI API key'
    required: false
  gemini-api-key:
    description: 'Google Gemini API key'
    required: false

  # Review behavior
  base-branch:
    description: 'Base branch to compare against'
    required: false
    default: 'main'
  reviewers:
    description: 'Comma-separated list of reviewers to use (e.g., security,architecture)'
    required: false
  block-threshold:
    description: 'Severity threshold for blocking (critical, high, medium, low, none)'
    required: false
    default: 'none'

  # Output options
  post-review:
    description: 'Post review comments to PR'
    required: false
    default: 'true'
  fail-on-findings:
    description: 'Fail the action if findings exist above block-threshold'
    required: false
    default: 'false'

  # Advanced
  config-file:
    description: 'Path to cr.yaml config file (auto-detects .github/cr.yaml or cr.yaml if not specified)'
    required: false
  log-level:
    description: 'Log level (trace, debug, info, error)'
    required: false
    default: 'info'

outputs:
  findings-count:
    description: 'Total number of findings'
    value: ${{ steps.review.outputs.findings-count }}
  critical-count:
    description: 'Number of critical severity findings'
    value: ${{ steps.review.outputs.critical-count }}
  high-count:
    description: 'Number of high severity findings'
    value: ${{ steps.review.outputs.high-count }}
  medium-count:
    description: 'Number of medium severity findings'
    value: ${{ steps.review.outputs.medium-count }}
  low-count:
    description: 'Number of low severity findings'
    value: ${{ steps.review.outputs.low-count }}
  summary:
    description: 'Markdown summary of the review'
    value: ${{ steps.review.outputs.summary }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      env:
        INPUT_ANTHROPIC_KEY: ${{ inputs.anthropic-api-key }}
        INPUT_OPENAI_KEY: ${{ inputs.openai-api-key }}
        INPUT_GEMINI_KEY: ${{ inputs.gemini-api-key }}
        INPUT_POST_REVIEW: ${{ inputs.post-review }}
        EVENT_NAME: ${{ github.event_name }}
      run: |
        set -euo pipefail

        # Check at least one API key is provided
        if [ -z "$INPUT_ANTHROPIC_KEY" ] && [ -z "$INPUT_OPENAI_KEY" ] && [ -z "$INPUT_GEMINI_KEY" ]; then
          echo "::error::At least one API key must be provided (anthropic-api-key, openai-api-key, or gemini-api-key)"
          exit 1
        fi

        # Warn if post-review is enabled on non-PR events
        if [ "$INPUT_POST_REVIEW" = "true" ] && [ "$EVENT_NAME" != "pull_request" ]; then
          echo "::warning::post-review is enabled but this is not a pull_request event. PR comments will not be posted."
        fi

    - name: Install code-reviewer
      shell: bash
      env:
        ACTION_REF: ${{ github.action_ref }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        # Determine version from action ref
        VERSION="$ACTION_REF"
        if [ -z "$VERSION" ] || [ "$VERSION" = "main" ]; then
          VERSION="latest"
        fi

        echo "Installing code-reviewer ${VERSION}..."

        # Detect OS and architecture
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac

        # Set up install directory (avoid /usr/local/bin for portability)
        INSTALL_DIR="${RUNNER_TEMP}/cr-bin"
        mkdir -p "$INSTALL_DIR"

        # Resolve version and build download URL
        if [ "$VERSION" = "latest" ]; then
          # Query API with authentication to avoid rate limits
          LATEST_VERSION=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/bkyoung/code-reviewer/releases/latest | \
            jq -r '.tag_name')
          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
            echo "::error::Failed to determine latest version"
            exit 1
          fi
          VERSION="$LATEST_VERSION"
        fi

        VERSION_NUM="${VERSION#v}"
        ARCHIVE_NAME="code-reviewer_${VERSION_NUM}_${OS}_${ARCH}.tar.gz"
        DOWNLOAD_URL="https://github.com/bkyoung/code-reviewer/releases/download/${VERSION}/${ARCHIVE_NAME}"
        CHECKSUM_URL="https://github.com/bkyoung/code-reviewer/releases/download/${VERSION}/checksums.txt"

        echo "Downloading from: $DOWNLOAD_URL"

        # Download archive and checksums
        TEMP_DIR=$(mktemp -d)
        curl -fsSL "$DOWNLOAD_URL" -o "$TEMP_DIR/$ARCHIVE_NAME"
        curl -fsSL "$CHECKSUM_URL" -o "$TEMP_DIR/checksums.txt"

        # Verify checksum
        cd "$TEMP_DIR"
        EXPECTED_CHECKSUM=$(grep "$ARCHIVE_NAME" checksums.txt | awk '{print $1}')
        if [ -z "$EXPECTED_CHECKSUM" ]; then
          echo "::error::Checksum not found for $ARCHIVE_NAME"
          exit 1
        fi

        if command -v sha256sum &> /dev/null; then
          ACTUAL_CHECKSUM=$(sha256sum "$ARCHIVE_NAME" | awk '{print $1}')
        else
          # macOS uses shasum
          ACTUAL_CHECKSUM=$(shasum -a 256 "$ARCHIVE_NAME" | awk '{print $1}')
        fi

        if [ "$EXPECTED_CHECKSUM" != "$ACTUAL_CHECKSUM" ]; then
          echo "::error::Checksum verification failed!"
          echo "Expected: $EXPECTED_CHECKSUM"
          echo "Actual:   $ACTUAL_CHECKSUM"
          exit 1
        fi

        echo "Checksum verified successfully"

        # Extract binary
        tar xzf "$ARCHIVE_NAME" -C "$INSTALL_DIR" cr
        chmod +x "$INSTALL_DIR/cr"

        # Add to PATH for subsequent steps
        echo "$INSTALL_DIR" >> "$GITHUB_PATH"

        # Verify installation
        "$INSTALL_DIR/cr" version

        # Cleanup
        rm -rf "$TEMP_DIR"

    - name: Run code review
      id: review
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        GITHUB_TOKEN: ${{ github.token }}
        # Pass all inputs as environment variables to avoid shell injection
        INPUT_BASE_BRANCH: ${{ inputs.base-branch }}
        INPUT_LOG_LEVEL: ${{ inputs.log-level }}
        INPUT_POST_REVIEW: ${{ inputs.post-review }}
        INPUT_REVIEWERS: ${{ inputs.reviewers }}
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
        INPUT_FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
        INPUT_BLOCK_THRESHOLD: ${{ inputs.block-threshold }}
        # GitHub context
        GH_HEAD_REF: ${{ github.head_ref }}
        GH_REPO_OWNER: ${{ github.repository_owner }}
        GH_REPO_NAME: ${{ github.event.repository.name }}
        GH_PR_NUMBER: ${{ github.event.pull_request.number }}
        GH_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        GH_WORKSPACE: ${{ github.workspace }}
        GH_EVENT_NAME: ${{ github.event_name }}
      run: |
        set -euo pipefail

        # Validate PR context for review
        if [ -z "$GH_HEAD_REF" ]; then
          echo "::error::github.head_ref is not available. This action must run on pull_request events."
          exit 1
        fi

        # Build command using array to avoid injection
        CMD=(cr review branch "$GH_HEAD_REF")
        CMD+=(--base "$INPUT_BASE_BRANCH")
        CMD+=(--log-level "$INPUT_LOG_LEVEL")

        # Output directory
        OUTPUT_DIR="${RUNNER_TEMP}/review-output"
        mkdir -p "$OUTPUT_DIR"
        CMD+=(--output "$OUTPUT_DIR")

        # GitHub PR posting (only on PR events)
        if [ "$INPUT_POST_REVIEW" = "true" ] && [ "$GH_EVENT_NAME" = "pull_request" ]; then
          CMD+=(--post-github-review)
          CMD+=(--github-owner "$GH_REPO_OWNER")
          CMD+=(--github-repo "$GH_REPO_NAME")
          CMD+=(--pr-number "$GH_PR_NUMBER")
          CMD+=(--commit-sha "$GH_COMMIT_SHA")
        fi

        # Optional reviewers
        if [ -n "$INPUT_REVIEWERS" ]; then
          CMD+=(--reviewers "$INPUT_REVIEWERS")
        fi

        # Config file: explicit input > .github/cr.yaml > cr.yaml > defaults
        CONFIG_FILE=""
        if [ -n "$INPUT_CONFIG_FILE" ]; then
          CONFIG_FILE="${GH_WORKSPACE}/${INPUT_CONFIG_FILE}"
        elif [ -f "${GH_WORKSPACE}/.github/cr.yaml" ]; then
          CONFIG_FILE="${GH_WORKSPACE}/.github/cr.yaml"
          echo "::notice::Using config file: .github/cr.yaml"
        elif [ -f "${GH_WORKSPACE}/cr.yaml" ]; then
          CONFIG_FILE="${GH_WORKSPACE}/cr.yaml"
          echo "::notice::Using config file: cr.yaml"
        fi

        if [ -n "$CONFIG_FILE" ]; then
          CMD+=(--config "$CONFIG_FILE")
        fi

        echo "::group::Running code review"
        echo "Command: ${CMD[*]}"

        # Run review, capture exit code
        set +e
        "${CMD[@]}"
        CR_EXIT_CODE=$?
        set -e
        echo "::endgroup::"

        # Parse results using jq (available on GitHub runners)
        TOTAL=0 CRITICAL=0 HIGH=0 MEDIUM=0 LOW=0

        JSON_FILE=$(find "$OUTPUT_DIR" -name "*.json" -type f 2>/dev/null | head -1)
        if [ -n "$JSON_FILE" ] && [ -f "$JSON_FILE" ]; then
          TOTAL=$(jq -r '.total_findings // 0' "$JSON_FILE" 2>/dev/null || echo "0")
          CRITICAL=$(jq -r '.severity_counts.critical // 0' "$JSON_FILE" 2>/dev/null || echo "0")
          HIGH=$(jq -r '.severity_counts.high // 0' "$JSON_FILE" 2>/dev/null || echo "0")
          MEDIUM=$(jq -r '.severity_counts.medium // 0' "$JSON_FILE" 2>/dev/null || echo "0")
          LOW=$(jq -r '.severity_counts.low // 0' "$JSON_FILE" 2>/dev/null || echo "0")
        fi

        echo "findings-count=$TOTAL" >> "$GITHUB_OUTPUT"
        echo "critical-count=$CRITICAL" >> "$GITHUB_OUTPUT"
        echo "high-count=$HIGH" >> "$GITHUB_OUTPUT"
        echo "medium-count=$MEDIUM" >> "$GITHUB_OUTPUT"
        echo "low-count=$LOW" >> "$GITHUB_OUTPUT"

        echo "::notice::Review complete: $TOTAL findings ($CRITICAL critical, $HIGH high, $MEDIUM medium, $LOW low)"

        # Write summary (with safe truncation)
        MD_FILE=$(find "$OUTPUT_DIR" -name "*_merged_*.md" -type f 2>/dev/null | head -1)
        if [ -n "$MD_FILE" ] && [ -f "$MD_FILE" ]; then
          # Truncate to 64000 chars (leaving buffer for GitHub's 65535 limit)
          head -c 64000 "$MD_FILE" >> "$GITHUB_STEP_SUMMARY"
          {
            echo "summary<<EOF"
            head -c 64000 "$MD_FILE"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        fi

        # Check threshold
        SHOULD_FAIL=0
        if [ "$INPUT_FAIL_ON_FINDINGS" = "true" ]; then
          case "$INPUT_BLOCK_THRESHOLD" in
            critical)
              [ "$CRITICAL" -gt 0 ] && SHOULD_FAIL=1 ;;
            high)
              [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ] && SHOULD_FAIL=1 ;;
            medium)
              [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ] || [ "$MEDIUM" -gt 0 ] && SHOULD_FAIL=1 ;;
            low)
              [ "$TOTAL" -gt 0 ] && SHOULD_FAIL=1 ;;
          esac

          if [ "$SHOULD_FAIL" -eq 1 ]; then
            echo "::error::Findings exceed block threshold ($INPUT_BLOCK_THRESHOLD)"
            exit 1
          fi
        fi

        # Propagate cr exit code
        if [ "$CR_EXIT_CODE" -ne 0 ]; then
          echo "::error::Code review failed with exit code $CR_EXIT_CODE"
          exit "$CR_EXIT_CODE"
        fi

# Code Reviewer Configuration File
# This file configures the code-reviewer application for CI/CD usage

# LLM Provider Configuration
providers:
  # Static provider (for testing - returns canned responses)
  static:
    enabled: false
    model: "static-model"

  # OpenAI provider (GPT models)
  openai:
    enabled: true
    model: "gpt-5.2"
    apiKey: "${OPENAI_API_KEY}"

  # Anthropic provider (Claude models)
  anthropic:
    enabled: true
    model: "claude-sonnet-4-5-20250929"
    apiKey: "${ANTHROPIC_API_KEY}"

  # Google Gemini provider
  gemini:
    enabled: true
    model: "gemini-3-pro-preview"
    apiKey: "${GEMINI_API_KEY}"
    timeout: "180s"  # Gemini 3 Pro is a reasoning model that may need extra time

  # Ollama provider (local LLM)
  # ollama:
  #   enabled: false
  #   model: "qwen3:235b"

# Store Configuration
# Enables persistence of review history to SQLite database
store:
  enabled: true
  path: "~/.config/cr/reviews.db"

# Output Configuration
output:
  directory: "./review-output"

# Git Configuration (optional)
# git:
#   repositoryDir: "."

# Planning Configuration (disabled for CI/CD - not interactive)
planning:
  enabled: false
  provider: "openai"
  model: "gpt-4o-mini"
  maxQuestions: 5
  timeout: "30s"

# Merge Configuration (for multi-provider consensus)
merge:
  enabled: true
  strategy: "consensus"
  # LLM provider for summary synthesis (defaults to anthropic/claude-haiku-4-5)
  provider: "anthropic"
  model: "claude-haiku-4-5"

# Verification Configuration (agent verification of findings)
verification:
  enabled: true
  # LLM provider for verification (defaults to gemini/gemini-3-flash-preview)
  provider: "gemini"
  model: "gemini-3-flash-preview"
  maxTokens: 64000
  depth: "medium"
  costCeiling: 0.50
  confidence:
    default: 75
    critical: 60
    high: 70
    medium: 75
    low: 85

# Budget Configuration (cost control)
# budget:
#   hardCapUSD: 10.0
#   degradationPolicy:
#     - "reduce-providers"
#     - "reduce-context"

# Redaction Configuration (secret protection)
# IMPORTANT: Enable this for production use!
redaction:
  enabled: true
  denyGlobs:
    - "**/*.env"
    - "**/*.pem"
    - "**/*.key"
    - "**/credentials.json"
    - "**/secrets.*"

# Determinism Configuration (reproducible reviews)
determinism:
  enabled: false
  temperature: 0.0
  useSeed: true

# Observability Configuration
observability:
  logging:
    enabled: true
    level: "info"
    format: "human"
    redactAPIKeys: true
  metrics:
    enabled: true

# Deduplication Configuration
# Controls finding deduplication across providers
deduplication:
  semantic:
    enabled: true
    # LLM provider for semantic comparison (uses a fast model)
    provider: "anthropic"
    model: "claude-haiku-4-5-latest"
    maxTokens: 64000
    # Only compare findings within this line distance
    lineThreshold: 10
    # Cost guard: max pairs to compare per review
    maxCandidates: 50

# Size Guards Configuration
# Prevents context overflow when reviewing large PRs
sizeGuards:
  enabled: true
  # Emit warning at this token count
  warnTokens: 150000
  # Truncate PR at this token count
  maxTokens: 200000
  # Per-provider overrides for different context limits
  providers:
    gemini:
      warnTokens: 750000
      maxTokens: 1000000

# Review Configuration
# Custom instructions to guide the code review process
# NOTE: Output format is handled by the system. These instructions focus on WHAT to review.
review:
  # GitHub bot username for auto-dismissing stale reviews
  # Set to "none" to disable auto-dismiss
  botUsername: "github-actions[bot]"

  # Block threshold: which severity levels trigger REQUEST_CHANGES
  # Valid: "critical", "high" (default), "medium", "low", "none"
  blockThreshold: "high"

  # Categories that always block regardless of severity
  alwaysBlockCategories:
    - "security"

  # Fine-grained action control (overrides blockThreshold for specific severities)
  # actions:
  #   onCritical: "request_changes"
  #   onHigh: "request_changes"
  #   onMedium: "comment"
  #   onLow: "comment"
  #   onClean: "approve"
  #   onNonBlocking: "approve"

  instructions: |
    Perform a thorough, systematic review focusing on these categories:

    **Security (use category: "security", severity: "high" for vulnerabilities):**
    - Injection vulnerabilities (SQL, command, XSS)
    - Authentication/authorization issues
    - Sensitive data exposure (secrets, PII, API keys)
    - Input validation and sanitization
    - OWASP Top 10 vulnerabilities

    **Bugs (use category: "bug"):**
    - Null dereferences, off-by-one errors, logic errors (severity: "high")
    - Race conditions, resource leaks, deadlocks (severity: "high")
    - Edge cases: empty inputs, boundary conditions (severity: "medium")
    - Concurrency issues, goroutine leaks (severity: "high")

    **Test Coverage (use category: "test_coverage", severity: "medium"):**
    - Missing unit tests for new functionality
    - Untested edge cases and error paths
    - Weak assertions that don't verify behavior

    **Code Quality (use category: "maintainability", severity: "low"):**
    - DRY violations and duplicated code
    - Complex functions needing decomposition
    - Poor naming or unclear code
    - Silent error swallowing (use category: "error_handling", severity: "medium")

    **Architecture (use category: "architecture", severity: "medium"):**
    - SOLID principle violations
    - Inappropriate abstraction levels
    - Missing dependency injection

    **Performance (use category: "performance"):**
    - N+1 queries, unnecessary allocations (severity: "medium")
    - Poor algorithmic complexity (severity: "high" if significant)

    Prioritize: security vulnerabilities > bugs > error handling > everything else.
    Only report actionable issues. Skip stylistic preferences unless they impact clarity.

# HTTP Configuration
http:
  timeout: "120s"
  maxRetries: 5
  initialBackoff: "2s"
  maxBackoff: "30s"
  backoffMultiplier: 2.0
